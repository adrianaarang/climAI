services:
  # 1. Base de Datos (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: climai_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=climai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Redis
  redis:
    image: redis:alpine
    container_name: climai_redis
    ports:
      - "6379:6379"

  # 3. API (FastAPI)
  app:
    build:
      context: ..
      dockerfile: ./Dockerfile
    container_name: climai_app
    restart: always
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/climai_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
    depends_on:
      - db
      - redis

  # 4. Worker (Celery)
  worker:
    build:
      context: ..
      dockerfile: ./Dockerfile
    container_name: climai_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/climai_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data: